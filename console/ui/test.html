<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>グラフテスト</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px; 
            background: #1a1a1a; 
            color: #e5e7eb;
        }
        .section { 
            border: 2px solid #374151; 
            padding: 20px; 
            margin: 15px 0; 
            background: #111827;
            border-radius: 8px;
        }
        h1 { color: #3b82f6; }
        h2 { color: #10b981; margin-top: 0; }
        .mini-chart { 
            border: 1px solid #4b5563; 
            padding: 15px; 
            background: #1f2937;
            border-radius: 6px;
            margin: 10px 0;
        }
        .mini-bars { 
            display: flex; 
            gap: 3px; 
            height: 120px; 
            align-items: flex-end; 
            background: #0f172a;
            padding: 5px;
            border-radius: 4px;
        }
        .mini-bar { 
            flex: 1; 
            background: linear-gradient(to top, #3b82f6, #60a5fa);
            min-height: 2px;
            border-radius: 2px 2px 0 0;
            transition: all 0.2s;
        }
        .mini-bar:hover {
            background: linear-gradient(to top, #2563eb, #3b82f6);
            transform: scaleY(1.05);
        }
        pre { 
            background: #000; 
            padding: 12px; 
            overflow-x: auto;
            border-radius: 4px;
            border: 1px solid #374151;
        }
        .success { color: #10b981; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        .info { color: #3b82f6; }
        .status { 
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
        }
        .status.ok { background: #065f46; color: #10b981; }
        .status.fail { background: #7f1d1d; color: #ef4444; }
    </style>
</head>
<body>
    <h1>📊 グラフレンダリングテスト</h1>
    
    <div class="section">
        <h2>ステップ1: データ取得</h2>
        <div id="step1">テスト中...</div>
    </div>
    
    <div class="section">
        <h2>ステップ2: グラフ描画（サンプルデータ）</h2>
        <div id="step2"></div>
    </div>
    
    <div class="section">
        <h2>ステップ3: グラフ描画（実データ）</h2>
        <div id="step3">データ読み込み中...</div>
    </div>
    
    <div class="section">
        <h2>ステップ4: 統計情報</h2>
        <div id="step4">計算中...</div>
    </div>
    
    <script>
        const fmt = {
            usd: (v) => v == null ? '—' : `$${Number(v).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`,
            pct: (v) => v == null ? '—' : `${(Number(v) * 100).toFixed(2)}%`,
        };
        
        function renderChart(series, key, type) {
            console.log(`renderChart called: ${series.length} items, key=${key}, type=${type}`);
            
            if (!series || series.length === 0) {
                return '<p class="error">❌ データがありません</p>';
            }
            
            const vals = series.map(d => d[key]).filter(v => v != null);
            if (vals.length === 0) {
                return '<p class="error">❌ 有効な値がありません</p>';
            }
            
            const max = Math.max(...vals);
            const min = Math.min(...vals);
            const range = max - min || 1;
            
            const firstDate = series[0]?.ts ? new Date(series[0].ts).toLocaleDateString('ja-JP', {month: 'short', day: 'numeric'}) : '開始';
            const lastDate = series[series.length - 1]?.ts ? new Date(series[series.length - 1].ts).toLocaleDateString('ja-JP', {month: 'short', day: 'numeric'}) : '終了';
            
            const bars = series.map(d => {
                const v = d[key];
                if (v == null) return '<div class="mini-bar" style="height:2px;background:#444"></div>';
                const pct = ((v - min) / range) * 100;
                const fmtVal = type === 'usd' ? fmt.usd(v) : type === 'pct' ? fmt.pct(v) : v;
                return `<div class="mini-bar" style="height:${Math.max(pct, 5)}%" title="${fmtVal}"></div>`;
            }).join('');
            
            return `
            <div class="mini-chart">
                <div class="mini-bars">${bars}</div>
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#9ca3af;margin-top:8px;">
                    <span><strong>${firstDate}</strong></span>
                    <span><strong>${lastDate}</strong></span>
                </div>
                <div style="margin-top:8px;font-size:13px;color:#6b7280;">
                    最小: <strong>${type === 'usd' ? fmt.usd(min) : type === 'pct' ? fmt.pct(min) : min}</strong> / 
                    最大: <strong>${type === 'usd' ? fmt.usd(max) : type === 'pct' ? fmt.pct(max) : max}</strong>
                </div>
            </div>`;
        }
        
        // Step 2: サンプルデータでテスト
        const sampleData = [
            {ts: '2026-04-03T00:00:00', value: 95000},
            {ts: '2026-04-08T00:00:00', value: 97500},
            {ts: '2026-04-10T00:00:00', value: 99015},
            {ts: '2026-04-15T00:00:00', value: 101200},
            {ts: '2026-04-18T00:00:00', value: 102800},
            {ts: '2026-04-20T00:00:00', value: 103500},
            {ts: '2026-04-23T00:00:00', value: 104189}
        ];
        
        document.getElementById('step2').innerHTML = `
            <p class="success">✅ サンプルデータ（7ポイント）</p>
            ${renderChart(sampleData, 'value', 'usd')}
        `;
        
        // Step 1 & 3: 実データ取得
        fetch('/api/dashboard')
            .then(r => {
                console.log('API response status:', r.status);
                return r.json();
            })
            .then(data => {
                console.log('API data received:', data);
                
                const charts = data.charts?.overview;
                const equity = charts?.equity || [];
                const drawdown = charts?.drawdown_pct || [];
                const positions = charts?.open_positions || [];
                
                // Step 1
                document.getElementById('step1').innerHTML = `
                    <p class="success">✅ API接続成功</p>
                    <pre>Equity: ${equity.length} データポイント
Drawdown: ${drawdown.length} データポイント
Positions: ${positions.length} データポイント

サンプル (最初):
${JSON.stringify(equity[0], null, 2)}

サンプル (最後):
${JSON.stringify(equity[equity.length - 1], null, 2)}</pre>
                `;
                
                // Step 3
                if (equity.length > 0) {
                    document.getElementById('step3').innerHTML = `
                        <h3 style="color:#3b82f6">Equity推移</h3>
                        ${renderChart(equity, 'value', 'usd')}
                        
                        <h3 style="color:#3b82f6;margin-top:20px">Drawdown推移</h3>
                        ${renderChart(drawdown, 'value', 'pct')}
                        
                        <h3 style="color:#3b82f6;margin-top:20px">Open Positions推移</h3>
                        ${renderChart(positions, 'value', 'count')}
                    `;
                } else {
                    document.getElementById('step3').innerHTML = '<p class="error">❌ データが空です</p>';
                }
                
                // Step 4: 統計
                const equityVals = equity.map(d => d.value);
                const firstEquity = equityVals[0];
                const lastEquity = equityVals[equityVals.length - 1];
                const totalReturn = lastEquity && firstEquity ? ((lastEquity - firstEquity) / firstEquity) : 0;
                const maxEquity = Math.max(...equityVals);
                const minEquity = Math.min(...equityVals);
                
                document.getElementById('step4').innerHTML = `
                    <pre>期間: ${equity.length}日分のデータ

開始Equity: ${fmt.usd(firstEquity)}
終了Equity: ${fmt.usd(lastEquity)}
リターン: ${fmt.pct(totalReturn)}

最高値: ${fmt.usd(maxEquity)}
最安値: ${fmt.usd(minEquity)}
変動幅: ${fmt.usd(maxEquity - minEquity)}</pre>
                `;
            })
            .catch(e => {
                console.error('API error:', e);
                document.getElementById('step1').innerHTML = `<p class="error">❌ API接続エラー: ${e.message}</p>`;
                document.getElementById('step3').innerHTML = `<p class="error">❌ データ取得失敗</p>`;
                document.getElementById('step4').innerHTML = `<p class="error">❌ 統計計算不可</p>`;
            });
    </script>
</body>
</html>
